<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飛行場時系列予報</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; color: #333; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #fff; }
        h2 { text-align: center; font-weight: normal; border-bottom: 2px solid #0078D4; padding-bottom: 15px; margin-bottom: 20px; letter-spacing: 1px; color: #0078D4; }
        .search-container { display: flex; gap: 15px; justify-content: center; align-items: center; margin-bottom: 30px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        input[type="text"] { padding: 10px; font-size: 16px; border: 1px solid #ccc; width: 30%; text-transform: uppercase; outline: none; }
        input[type="text"]:focus { border-color: #0078D4; }
        button { padding: 10px 20px; font-size: 16px; background-color: #0078D4; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background-color: #005a9e; }
        
        /* PDFボタンを最初から表示 */
        .btn-pdf { background-color: #28a745; display: inline-block; }
        .btn-pdf:hover { background-color: #218838; }
        
        .options-group { display: flex; flex-direction: column; gap: 5px; }
        .radio-option { font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer; color: #555; }
        
        .card { border-left: 4px solid #0078D4; border-top: 1px solid #eee; border-right: 1px solid #eee; border-bottom: 1px solid #eee; padding: 20px; margin-bottom: 20px; border-radius: 0 4px 4px 0; }
        .card h3 { display: flex; align-items: center; margin: 0 0 15px 0; font-size: 20px; color: #0078D4; border-bottom: 1px dashed #eee; padding-bottom: 10px; }
        
        .img-wrapper { margin-bottom: 20px; text-align: center; }
        .img-wrapper h4 { margin: 0 0 5px 0; font-size: 14px; color: #0078D4; text-align: left; font-weight: bold; }
        .img-wrapper img { max-width: 100%; height: auto; border: 1px solid #ddd; }
        .status-msg { color: #d9534f; font-weight: bold; font-size: 14px;}
    </style>
</head>
<body>

    <h2>飛行場時系列予報</h2>
    <div class="search-container">
        <input type="text" id="icao-input" placeholder="ICAO (RJTT RJAA...)" oninput="saveToLocal()">
        
        <button class="btn-search" onclick="searchImages()">Search</button>
        <button class="btn-pdf" id="btn-pdf" onclick="downloadPDF()">Download PDF</button>
        
        <div class="options-group">
            <label class="radio-option">
                <input type="radio" name="part-select" value="part1" checked> Part 1 Only
            </label>
            <label class="radio-option">
                <input type="radio" name="part-select" value="both"> Part 1 & 2
            </label>
        </div>
    </div>
    
    <div id="result-container"></div>

    <script>
        const WORKER_URL = "https://taf-proxy.bbfn2187.workers.dev";
        let fetchedImages = [];

        // ページ読み込み時に保存されたICAOを復元
        window.onload = () => {
            const savedIcao = localStorage.getItem('qmc_icao_input');
            if (savedIcao) {
                document.getElementById('icao-input').value = savedIcao;
            }
        };

        // 入力内容をローカルストレージに保存
        function saveToLocal() {
            const val = document.getElementById('icao-input').value;
            localStorage.setItem('qmc_icao_input', val);
        }

        async function fetchImageAsBase64(icao, type) {
            try {
                const response = await fetch(`${WORKER_URL}/?icao=${icao}&type=${type}`);
                if (!response.ok) return null;
                const blob = await response.blob();
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        async function searchImages() {
            const inputVal = document.getElementById('icao-input').value.toUpperCase();
            const icaos = inputVal.split(/[\s,]+/).filter(Boolean);
            const partSelect = document.querySelector('input[name="part-select"]:checked').value;
            
            const container = document.getElementById('result-container');
            
            container.innerHTML = '';
            fetchedImages = [];

            if (icaos.length === 0) {
                alert("ICAOコードを入力してください。");
                return;
            }

            for (const icao of icaos) {
                const section = document.createElement('div');
                section.className = 'card';
                section.innerHTML = `<h3>${icao}</h3><p id="status-${icao}" style="color:#777; font-size:14px;">データ取得中...</p>`;
                container.appendChild(section);
                const statusEl = document.getElementById(`status-${icao}`);

                let foundAny = false;

                const base64Part1 = await fetchImageAsBase64(icao, 'QMCD98');
                if (base64Part1) {
                    foundAny = true;
                    appendImageToSection(section, base64Part1, 'Part 1 (QMCD98)');
                    fetchedImages.push({ icao: icao, part: 'Part 1', dataUrl: base64Part1 });
                }

                if (partSelect === 'both') {
                    const base64Part2 = await fetchImageAsBase64(icao, 'QMCJ98');
                    if (base64Part2) {
                        foundAny = true;
                        appendImageToSection(section, base64Part2, 'Part 2 (QMCJ98)');
                        fetchedImages.push({ icao: icao, part: 'Part 2', dataUrl: base64Part2 });
                    }
                }

                if (foundAny) {
                    statusEl.style.display = 'none';
                } else {
                    statusEl.className = 'status-msg';
                    statusEl.innerText = '該当する予報図が見つかりませんでした。';
                }
            }
        }

        function appendImageToSection(section, dataUrl, title) {
            const wrapper = document.createElement('div');
            wrapper.className = 'img-wrapper';
            wrapper.innerHTML = `<h4>${title}</h4><img src="${dataUrl}" alt="${title}">`;
            section.appendChild(wrapper);
        }

        function downloadPDF() {
            if (fetchedImages.length === 0) {
                alert("表示されている画像がありません。先にSearchを実行してください。");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape', 'mm', 'a4'); 
            const pageWidth = doc.internal.pageSize.getWidth();
            const margin = 10;

            fetchedImages.forEach((imgObj, index) => {
                if (index > 0) doc.addPage();
                const imgProps = doc.getImageProperties(imgObj.dataUrl);
                const pdfImgWidth = pageWidth - (margin * 2);
                const pdfImgHeight = (imgProps.height * pdfImgWidth) / imgProps.width;
                doc.addImage(imgObj.dataUrl, 'PNG', margin, margin, pdfImgWidth, pdfImgHeight);
            });

            doc.save("BriefHub_QMC.pdf");
        }
    </script>
</body>
</html>
