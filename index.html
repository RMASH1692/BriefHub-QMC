<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飛行場時系列予報 - BriefHub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* 全体のリセットとベース設定 */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            color: #333; 
            background-color: #f4f7f6; 
        }

        /* モダンなヘッダーUI */
        .navbar {
            background-color: #0078D4;
            color: white;
            padding: 15px 20px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.15);
            margin-bottom: 30px;
        }
        .navbar-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
        }

        /* メインコンテンツ領域 */
        .main-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 40px 20px;
        }

        /* コントロールパネル */
        .controls { 
            background: white; 
            padding: 25px; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
            margin-bottom: 30px; 
            text-align: center; 
        }
        .input-group { margin-bottom: 15px; }
        input[type="text"] { 
            padding: 12px 15px; 
            font-size: 16px; 
            width: 60%; 
            max-width: 400px;
            text-transform: uppercase; 
            border: 1px solid #ccd1d9; 
            border-radius: 6px; 
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #0078D4;
        }
        .radio-group { margin-bottom: 20px; font-size: 15px; color: #555; }
        .radio-group label { margin: 0 15px; cursor: pointer; }
        
        button { 
            padding: 12px 30px; 
            font-size: 16px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            font-weight: bold; 
            transition: all 0.2s ease; 
        }
        .btn-search { background-color: #0078D4; color: white; box-shadow: 0 2px 4px rgba(0, 120, 212, 0.3); }
        .btn-search:hover { background-color: #005a9e; transform: translateY(-1px); }
        .btn-search:active { transform: translateY(1px); }
        
        .btn-pdf { background-color: #28a745; color: white; margin-top: 15px; display: none; box-shadow: 0 2px 4px rgba(40, 167, 69, 0.3); }
        .btn-pdf:hover { background-color: #218838; transform: translateY(-1px); }

        /* 結果表示エリア */
        .result-container { display: flex; flex-direction: column; gap: 30px; }
        .airport-section { 
            background: white; 
            padding: 25px; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); 
        }
        .airport-section h3 { 
            margin-top: 0; 
            color: #0078D4; 
            border-bottom: 2px solid #f0f0f0; 
            padding-bottom: 12px; 
            font-size: 20px;
        }
        .img-wrapper { margin-top: 20px; text-align: center; }
        .img-wrapper h4 { margin: 0 0 10px 0; color: #666; font-size: 14px; background: #f8f9fa; display: inline-block; padding: 4px 12px; border-radius: 20px;}
        .img-wrapper img { max-width: 100%; height: auto; border: 1px solid #e0e0e0; border-radius: 4px; }
        .status-msg { color: #d9534f; font-weight: bold; padding: 10px 0;}
    </style>
</head>
<body>

    <header class="navbar">
        <div class="navbar-container">
            <h1>飛行場時系列予報</h1>
        </div>
    </header>
    
    <div class="main-container">
        <div class="controls">
            <div class="input-group">
                <input type="text" id="icao-input" placeholder="ICAO (例: RJTT RJAA...)">
            </div>
            <div class="radio-group">
                <label><input type="radio" name="part-select" value="part1" checked> Part 1 Only</label>
                <label><input type="radio" name="part-select" value="both"> Part 1 & 2</label>
            </div>
            <button class="btn-search" onclick="searchImages()">Search</button>
            <br>
            <button class="btn-pdf" id="btn-pdf" onclick="downloadPDF()">Download PDF</button>
        </div>

        <div id="result-container" class="result-container"></div>
    </div>

    <script>
        const WORKER_URL = "https://taf-proxy.bbfn2187.workers.dev";
        
        let fetchedImages = [];

        async function fetchImageAsBase64(icao, type) {
            try {
                const response = await fetch(`${WORKER_URL}/?icao=${icao}&type=${type}`);
                if (!response.ok) return null;
                const blob = await response.blob();
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.readAsDataURL(blob);
                });
            } catch (e) {
                console.error(e);
                return null;
            }
        }

        async function searchImages() {
            const inputVal = document.getElementById('icao-input').value.toUpperCase();
            const icaos = inputVal.split(/[\s,]+/).filter(Boolean);
            const partSelect = document.querySelector('input[name="part-select"]:checked').value;
            
            const container = document.getElementById('result-container');
            const btnPdf = document.getElementById('btn-pdf');
            
            container.innerHTML = '';
            fetchedImages = [];
            btnPdf.style.display = 'none';

            if (icaos.length === 0) {
                alert("ICAOコードを入力してください。");
                return;
            }

            for (const icao of icaos) {
                const section = document.createElement('div');
                section.className = 'airport-section';
                section.innerHTML = `<h3>${icao}</h3><p id="status-${icao}" class="status-msg" style="color:#666;">データ取得中...</p>`;
                container.appendChild(section);
                const statusEl = document.getElementById(`status-${icao}`);

                let foundAny = false;

                // Part 1
                const base64Part1 = await fetchImageAsBase64(icao, 'QMCD98');
                if (base64Part1) {
                    foundAny = true;
                    appendImageToSection(section, base64Part1, 'Part 1');
                    fetchedImages.push({ icao: icao, part: 'Part 1', dataUrl: base64Part1 });
                }

                // Part 2
                if (partSelect === 'both') {
                    const base64Part2 = await fetchImageAsBase64(icao, 'QMCJ98');
                    if (base64Part2) {
                        foundAny = true;
                        appendImageToSection(section, base64Part2, 'Part 2');
                        fetchedImages.push({ icao: icao, part: 'Part 2', dataUrl: base64Part2 });
                    }
                }

                if (foundAny) {
                    statusEl.style.display = 'none';
                } else {
                    statusEl.className = 'status-msg';
                    statusEl.innerText = '該当する予報図が見つかりませんでした。';
                }
            }

            if (fetchedImages.length > 0) {
                btnPdf.style.display = 'inline-block';
            }
        }

        function appendImageToSection(section, dataUrl, title) {
            const wrapper = document.createElement('div');
            wrapper.className = 'img-wrapper';
            wrapper.innerHTML = `<h4>${title}</h4><img src="${dataUrl}" alt="${title}">`;
            section.appendChild(wrapper);
        }

        function downloadPDF() {
            if (fetchedImages.length === 0) return;

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape', 'mm', 'a4'); 
            const pageWidth = doc.internal.pageSize.getWidth();
            const margin = 10;

            fetchedImages.forEach((imgObj, index) => {
                if (index > 0) doc.addPage();

                // 以前あった doc.text(...) の青文字挿入コードを削除しました

                const imgProps = doc.getImageProperties(imgObj.dataUrl);
                const pdfImgWidth = pageWidth - (margin * 2);
                const pdfImgHeight = (imgProps.height * pdfImgWidth) / imgProps.width;

                // Y座標を margin + 15 から margin に変更し、画像を上に詰めました
                doc.addImage(imgObj.dataUrl, 'PNG', margin, margin, pdfImgWidth, pdfImgHeight);
            });

            doc.save("BriefHub_QMC.pdf");
        }
    </script>
</body>
</html>
